<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Retur</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="scan-container">
    <div class="header">
      <img src="assets/logo.png" alt="Logo" class="logo-small" onerror="this.style.display='none'">
      <div class="operator-info">
        Operator: <strong id="operatorName">-</strong>
        <button id="btnGanti" class="btn-ganti">Ganti</button>
      </div>
    </div>

    <div class="scan-box">
      <label for="resiInput">SCAN RESI</label>
      <input type="text" id="resiInput" autocomplete="off" autofocus>
      <button id="btnCamera" class="btn-camera">📷 Scan pakai Kamera</button>
    </div>

    <div id="cameraBox" class="camera-box" style="display:none;">
      <div id="cameraReader"></div>
      <button id="btnCloseCamera" class="btn-close-camera">Tutup Kamera</button>
    </div>

    <div id="statusBox" class="status-box status-idle">
      <div id="statusTitle" class="status-title">Siap menerima scan</div>
      <div id="statusDetail" class="status-detail"></div>
    </div>
  </div>

  <audio id="soundSuccess" src="assets/success.mp3" preload="auto"></audio>
  <audio id="soundDuplicate" src="assets/duplicate.mp3" preload="auto"></audio>
  <audio id="soundError" src="assets/error.mp3" preload="auto"></audio>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/scan.js"></script>
  <script src="js/camera.js"></script>
</body>
</html>
